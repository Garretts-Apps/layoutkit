name: Publish to npm

# Publishes packages/layoutkit (layoutkit-css) to the npm registry.
# Trigger by creating a GitHub Release (tag like v1.0.0), or run manually.
on:
  release:
    types: [published]
  workflow_dispatch:

# Auth is via npm trusted publishing (OIDC) — no NPM_TOKEN needed.
# Requires this workflow to be registered as a trusted publisher for
# layoutkit-css on npmjs.com (repo + workflow filename must match).
permissions:
  contents: read
  id-token: write # OIDC token npm exchanges for short-lived publish auth

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/layoutkit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 20 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Regenerate the stylesheet from source so the published file always
      # matches gen.mjs. (gen.mjs resolves its own paths, so cwd is fine.)
      - name: Generate stylesheet
        run: node gen.mjs

      # Fail early if the working tree drifted from the committed CSS.
      - name: Verify generated CSS is committed
        run: git diff --exit-code -- layoutkit.css ../../layoutkit.css

      # No token: OIDC trusted publishing authenticates and adds provenance
      # automatically.
      - name: Publish
        run: npm publish --access public
