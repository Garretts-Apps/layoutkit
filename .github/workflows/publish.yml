name: Publish to npm

# Publishes packages/layoutkit (layoutkit-css) to the npm registry.
# Trigger by creating a GitHub Release (tag like v1.0.0), or run manually.
on:
  release:
    types: [published]
  workflow_dispatch:

# Auth is via npm trusted publishing (OIDC), not registry secrets.
# Requires this workflow to be registered as a trusted publisher for
# layoutkit-css on npmjs.com (repo + workflow filename must match).
permissions:
  contents: read
  id-token: write # OIDC token npm exchanges for short-lived publish auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1. Node 22 runners may still
      # bundle npm 10.x, so upgrade the CLI in the release job without adding a
      # repo dependency or registry token.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Regenerate the stylesheet from source so the published file always
      # matches gen.mjs.
      - name: Generate stylesheet
        run: npm run build

      # Fail early if the working tree drifted from the committed CSS.
      - name: Verify generated CSS is committed
        run: git diff --exit-code -- layoutkit.css packages/layoutkit/layoutkit.css

      - name: Validate package
        run: npm run check

      # Publish only if this version isn't already on npm, so re-running on an
      # existing release/tag is a clean no-op instead of a failure.
      # No token: OIDC trusted publishing authenticates through npm Trusted
      # Publishing. Do not pass --provenance while this repository is private:
      # npm provenance currently supports only public GitHub source repositories.
      - name: Publish if new
        working-directory: packages/layoutkit
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
            echo "::notice::$NAME@$VERSION is already published — skipping."
          else
            npm publish --access public
          fi
